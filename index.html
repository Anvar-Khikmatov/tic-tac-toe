<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="container">
        <header> <h1>Tic Tac Toe</h1></header>

        <div class="player-section"> <h2>Player <span class="player-turn-display "></span> turn</h2></div>

        <div class="grid-box">
            <div class="tiles" data-index="0"></div>
            <div class="tiles" data-index="1"></div>
            <div class="tiles" data-index="2"></div>
            <div class="tiles" data-index="3"></div>
            <div class="tiles" data-index="4"></div>
            <div class="tiles" data-index="5"></div>
            <div class="tiles" data-index="6"></div>
            <div class="tiles" data-index="7"></div>
            <div class="tiles" data-index="8"></div>
        </div>

        <div class="winner-message">  </div>

        <div class="newgame"><button class="new-game">New Game</button></div>

    </div>    

    <script src="script.js"></script>
</body>
</html>
